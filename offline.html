<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لا يوجد اتصال | صنايعي مطروح</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Tahoma,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:28px;padding:30px;max-width:520px;box-shadow:0 20px 50px rgba(15,23,42,.10)}
    .icon{width:76px;height:76px;border-radius:24px;background:#dbeafe;color:#1d4ed8;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold}
    h1{margin:0 0 10px;font-size:28px}
    p{margin:0 0 22px;line-height:1.9;color:#64748b;font-weight:700}
    a{display:inline-flex;background:#1d4ed8;color:#fff;text-decoration:none;border-radius:999px;padding:13px 20px;font-weight:900}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">!</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل حاليًا. جرّب الاتصال بالإنترنت ثم أعد فتح التطبيق.</p>
    <a href="/">إعادة المحاولة</a>
  </div>
</body>
</html>
